<!DOCTYPE html>
<html>
<head>
  <title>CivicSense AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🚀 CivicSense AI Dashboard</h1>

  <div class="card">
    <select id="category">
      <option value="">Select Issue</option>
      <option>Garbage</option>
      <option>Water Leakage</option>
      <option>Road Damage</option>
      <option>Dog Bite</option>
      <option>Street Light</option>
    </select>

    <select id="state">
      <option value="">Select State</option>
      <option>Maharashtra</option>
      <option>Delhi</option>
      <option>Karnataka</option>
      <option>Telangana</option>
    </select>

    <input id="district" placeholder="Enter District">

    <input type="file" id="imageInput" accept="image/*" capture="environment">

    <input id="problem" placeholder="Describe problem">

    <button id="voiceBtn">🎤 Voice Input</button>
    <button id="btn">🚀 Generate Report</button>
  </div>

  <div class="output-card">
    <pre id="output">Ready...</pre>
  </div>

  <h3>📊 Issue Analytics</h3>
  <canvas id="issueChart"></canvas>

  <h3>📊 State-wise Reports</h3>
  <canvas id="stateChart"></canvas>

  <h3>📋 Reports</h3>
  <div id="reportList"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>
</body>
</html>
