<!DOCTYPE html>
<html>
<head>
  <title>UrbanPulse AI</title>
  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

<div class="container">

<h1>🌆 UrbanPulse AI</h1>
<p class="tag">Smart Civic Dashboard</p>

<div class="card">
  <select id="category">
    <option value="">Select Issue</option>
    <option>Garbage</option>
    <option>Water Leakage</option>
    <option>Road Damage</option>
  </select>

  <input id="district" placeholder="District">
  <input id="problem" placeholder="Describe problem">

  <button onclick="generate()">Generate Report</button>
</div>

<div id="output" class="output">Ready...</div>

<h3>📊 Analytics</h3>
<div id="analytics" class="analytics"></div>

<div id="map"></div>

<h3>📋 Reports</h3>
<div id="list"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script src="app.js"></script>

</body>
</html>
