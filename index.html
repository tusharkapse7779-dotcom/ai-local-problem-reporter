<!DOCTYPE html>
<html>
<head>
  <title>CivicSense AI</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
</head>
<body>

<div class="container">
  <h1>🚀 CivicSense AI Dashboard</h1>

  <div class="card">
    <select id="category">
      <option value="">Select Issue</option>
      <option>Garbage</option>
      <option>Water Leakage</option>
      <option>Road Damage</option>
      <option>Dog Bite</option>
    </select>

    <select id="state">
      <option value="">Select State</option>
      <option>Maharashtra</option>
      <option>Delhi</option>
      <option>Karnataka</option>
    </select>

    <input id="district" placeholder="Enter District">
    <input id="problem" placeholder="Describe problem">

    <input type="file" id="imageInput" accept="image/*" capture="environment">
    <img id="preview">

    <button onclick="getLocation()">📍 Get Location</button>
    <button id="btn">🚀 Generate Report</button>
    <button onclick="downloadPDF()">📄 Export PDF</button>
  </div>

  <div id="map"></div>

  <pre id="output">Ready...</pre>

  <h3>Reports</h3>
  <div id="reportList"></div>

  <h3>Admin Panel</h3>
  <input id="searchToken" placeholder="Token">
  <select id="statusUpdate">
    <option>Pending</option>
    <option>In Progress</option>
    <option>Completed</option>
  </select>
  <button onclick="updateStatus()">Update</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>
<script src="app.js"></script>

</body>
</html>
